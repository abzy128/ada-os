networks:
  default:
    name: adaos
    ipam:
     config:
       - subnet: 172.18.0.0/16
         gateway: 172.18.0.1

services:
  rasa:
    image: rasa/rasa:latest
    # restart: unless-stopped
    volumes:
      - ./rasa:/app
    ports:
      - 5005:5005
    command: run -m models
    networks:
      default:
        ipv4_address: 172.18.0.2

  rasa-actions:
    build: 
      context: ./rasa
      dockerfile: actions.Dockerfile
    # restart: unless-stopped
    volumes: 
      - ./rasa/actions:/app/actions
    ports: 
      - 5055:5055
    networks:
      default:
        ipv4_address: 172.18.0.3

  whisper:
    build:
      context: ./voice
      dockerfile: Dockerfile
    # restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      default:
        ipv4_address: 172.18.0.4

